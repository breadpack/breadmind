replicaCount: 1

image:
  repository: breadmind
  tag: "0.1.0"
  pullPolicy: IfNotPresent

service:
  type: ClusterIP
  port: 8080

ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: breadmind.local
      paths:
        - path: /
          pathType: Prefix
  tls: []

config:
  llm:
    defaultProvider: claude
    defaultModel: claude-sonnet-4-6
    toolCallMaxTurns: 10
  mcp:
    autoDiscover: true
    maxRestartAttempts: 3

secrets:
  anthropicApiKey: ""
  dbPassword: "breadmind_dev"

postgres:
  enabled: true
  image:
    repository: pgvector/pgvector
    tag: pg17
  storage:
    size: 10Gi
    storageClass: ""
  resources:
    requests:
      memory: 256Mi
      cpu: 100m

externalDatabase:
  host: ""
  port: 5432
  name: breadmind
  user: breadmind
  password: ""

resources:
  requests:
    memory: 256Mi
    cpu: 100m
  limits:
    memory: 512Mi
    cpu: 500m
