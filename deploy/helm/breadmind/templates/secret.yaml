apiVersion: v1
kind: Secret
metadata:
  name: {{ .Release.Name }}-secrets
type: Opaque
stringData:
  ANTHROPIC_API_KEY: {{ .Values.secrets.anthropicApiKey | quote }}
  DB_PASSWORD: {{ if .Values.postgres.enabled }}{{ .Values.secrets.dbPassword | quote }}{{ else }}{{ .Values.externalDatabase.password | quote }}{{ end }}
