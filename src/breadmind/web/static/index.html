<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BreadMind</title>
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#6366f1">
  <link rel="apple-touch-icon" href="/static/icons/apple-touch-icon.png">
  <link rel="stylesheet" href="/static/css/sdui.css">
  <script type="importmap">
  {
    "imports": {
      "preact": "/static/vendor/preact.module.js",
      "preact/hooks": "/static/vendor/preact-hooks.module.js",
      "htm": "/static/vendor/htm.module.js"
    }
  }
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module" src="/static/sdui/main.js?v=2"></script>
  <script>
    // Unregister any previously registered SW during dev to avoid stale cache.
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
    }
  </script>
</body>
</html>
