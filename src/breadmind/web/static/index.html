<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BreadMind</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #0f172a; color: #e2e8f0; height: 100vh; display: flex; flex-direction: column; }
        header { background: #1e293b; padding: 16px 24px; border-bottom: 1px solid #334155; display: flex; align-items: center; gap: 12px; }
        header h1 { font-size: 20px; color: #f8fafc; }
        header .badge { background: #22c55e; color: #fff; font-size: 11px; padding: 2px 8px; border-radius: 10px; }
        .container { display: flex; flex: 1; overflow: hidden; }
        .sidebar { width: 280px; background: #1e293b; border-right: 1px solid #334155; padding: 16px; overflow-y: auto; }
        .sidebar h2 { font-size: 13px; text-transform: uppercase; color: #94a3b8; margin-bottom: 12px; letter-spacing: 1px; }
        .sidebar .section { margin-bottom: 24px; }
        .tool-item { padding: 6px 10px; font-size: 13px; color: #cbd5e1; border-radius: 4px; margin-bottom: 2px; }
        .tool-item:hover { background: #334155; }
        .tool-item .source { font-size: 11px; color: #64748b; }
        .chat-area { flex: 1; display: flex; flex-direction: column; }
        .messages { flex: 1; overflow-y: auto; padding: 24px; }
        .message { margin-bottom: 16px; max-width: 80%; }
        .message.user { margin-left: auto; }
        .message .bubble { padding: 12px 16px; border-radius: 12px; font-size: 14px; line-height: 1.5; white-space: pre-wrap; }
        .message.user .bubble { background: #3b82f6; color: white; border-bottom-right-radius: 4px; }
        .message.bot .bubble { background: #1e293b; border: 1px solid #334155; border-bottom-left-radius: 4px; }
        .message .meta { font-size: 11px; color: #64748b; margin-top: 4px; padding: 0 4px; }
        .message.user .meta { text-align: right; }
        .notification { background: #fbbf24; color: #1e293b; padding: 8px 16px; border-radius: 8px; margin-bottom: 8px; font-size: 13px; text-align: center; }
        .input-area { padding: 16px 24px; background: #1e293b; border-top: 1px solid #334155; }
        .input-row { display: flex; gap: 12px; }
        .input-row input { flex: 1; padding: 12px 16px; background: #0f172a; border: 1px solid #334155; border-radius: 8px; color: #e2e8f0; font-size: 14px; outline: none; }
        .input-row input:focus { border-color: #3b82f6; }
        .input-row button { padding: 12px 24px; background: #3b82f6; color: white; border: none; border-radius: 8px; font-size: 14px; cursor: pointer; }
        .input-row button:hover { background: #2563eb; }
        .input-row button:disabled { background: #475569; cursor: not-allowed; }
        .status { display: flex; align-items: center; gap: 6px; }
        .status .dot { width: 8px; height: 8px; border-radius: 50%; }
        .status .dot.connected { background: #22c55e; }
        .status .dot.disconnected { background: #ef4444; }
        .server-item { padding: 8px 10px; margin-bottom: 4px; border-radius: 4px; font-size: 13px; }
        .server-item .status-badge { font-size: 11px; padding: 1px 6px; border-radius: 4px; }
        .server-item .status-badge.running { background: #166534; color: #86efac; }
        .server-item .status-badge.stopped { background: #7f1d1d; color: #fca5a5; }
    </style>
</head>
<body>
    <header>
        <h1>BreadMind</h1>
        <span class="badge">v0.1.0</span>
        <div style="flex:1"></div>
        <div class="status">
            <span class="dot" id="statusDot"></span>
            <span id="statusText" style="font-size:13px;color:#94a3b8;">Connecting...</span>
        </div>
    </header>
    <div class="container">
        <div class="sidebar">
            <div class="section">
                <h2>Tools</h2>
                <div id="toolList"><div class="tool-item">Loading...</div></div>
            </div>
            <div class="section">
                <h2>MCP Servers</h2>
                <div id="serverList"><div class="tool-item">Loading...</div></div>
            </div>
        </div>
        <div class="chat-area">
            <div class="messages" id="messages">
                <div class="message bot">
                    <div class="bubble">Welcome to BreadMind! I'm your AI infrastructure agent. How can I help?</div>
                    <div class="meta">BreadMind</div>
                </div>
            </div>
            <div class="input-area">
                <div class="input-row">
                    <input type="text" id="messageInput" placeholder="Type a message..." autocomplete="off">
                    <button id="sendBtn" onclick="sendMessage()">Send</button>
                </div>
            </div>
        </div>
    </div>
    <script>
        let ws;
        const messagesDiv = document.getElementById('messages');
        const input = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDot = document.getElementById('statusDot');
        const statusText = document.getElementById('statusText');

        function connect() {
            const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
            ws = new WebSocket(`${protocol}//${location.host}/ws/chat`);
            ws.onopen = () => { statusDot.className = 'dot connected'; statusText.textContent = 'Connected'; };
            ws.onclose = () => { statusDot.className = 'dot disconnected'; statusText.textContent = 'Disconnected'; setTimeout(connect, 3000); };
            ws.onmessage = (event) => {
                const data = JSON.parse(event.data);
                if (data.type === 'response') addMessage(data.message, 'bot');
                else if (data.type === 'notification') addNotification(data.message);
                sendBtn.disabled = false;
                sendBtn.textContent = 'Send';
            };
        }

        function sendMessage() {
            const text = input.value.trim();
            if (!text || !ws || ws.readyState !== WebSocket.OPEN) return;
            addMessage(text, 'user');
            ws.send(JSON.stringify({ message: text }));
            input.value = '';
            sendBtn.disabled = true;
            sendBtn.textContent = '...';
        }

        function addMessage(text, type) {
            const div = document.createElement('div');
            div.className = `message ${type}`;
            const time = new Date().toLocaleTimeString();
            div.innerHTML = `<div class="bubble">${escapeHtml(text)}</div><div class="meta">${type === 'user' ? 'You' : 'BreadMind'} · ${time}</div>`;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function addNotification(text) {
            const div = document.createElement('div');
            div.className = 'notification';
            div.textContent = text;
            messagesDiv.appendChild(div);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        input.addEventListener('keydown', (e) => { if (e.key === 'Enter') sendMessage(); });

        // Load tools and servers
        fetch('/api/tools').then(r => r.json()).then(data => {
            const list = document.getElementById('toolList');
            list.innerHTML = data.tools.map(t => `<div class="tool-item">${t.name}<br><span class="source">${t.source} · ${t.description.substring(0, 50)}</span></div>`).join('');
        }).catch(() => {});

        fetch('/api/mcp/servers').then(r => r.json()).then(data => {
            const list = document.getElementById('serverList');
            if (data.servers.length === 0) { list.innerHTML = '<div class="tool-item" style="color:#64748b">No servers connected</div>'; return; }
            list.innerHTML = data.servers.map(s => `<div class="server-item">${s.name} <span class="status-badge ${s.status}">${s.status}</span></div>`).join('');
        }).catch(() => {});

        connect();
    </script>
</body>
</html>
