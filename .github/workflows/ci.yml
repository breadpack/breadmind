name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]
  schedule:
    - cron: "0 3 * * 1"  # Mon 03:00 UTC weekly quality regression

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run unit tests
        run: python -m pytest tests/ -v --tb=short --ignore=tests/e2e
      - name: Baseline coverage (55%)
        run: python -m pytest tests/ --ignore=tests/e2e --cov=breadmind --cov-fail-under=55
      - name: High-bar coverage on security modules (85%)
        run: |
          python -m pytest tests/kb tests/e2e \
            --cov=breadmind.kb.redactor \
            --cov=breadmind.kb.acl \
            --cov=breadmind.kb.citation \
            --cov-fail-under=85

  e2e:
    runs-on: ubuntu-latest
    services:
      docker:
        image: docker:24-dind
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run E2E
        env:
          TESTCONTAINERS_RYUK_DISABLED: "true"
        run: python -m pytest tests/e2e -v --tb=short

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install ruff
      - run: ruff check src/ tests/

  weekly-quality-regression:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"
      - name: Run quality eval
        run: python -c "import asyncio; from breadmind.kb.quality_eval import run_weekly_eval; asyncio.run(run_weekly_eval('tests/e2e/goldens/qa.json', satisfaction=(0,0)))"
      - name: Open PR with report
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "breadmind-bot"
          git config user.email "breadmind-bot@users.noreply.github.com"
          BRANCH="quality-report/$(date -u +%Y%m%d-%H%M%S)"
          git checkout -b "$BRANCH"
          git add docs/pilot/quality-reports
          git commit -m "chore(quality): weekly quality regression report" || exit 0
          git push -u origin "$BRANCH"
          gh pr create --title "Weekly quality regression report" \
                      --body "Auto-generated. See docs/pilot/quality-reports/"
