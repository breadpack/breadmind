# ============================================================
# BreadMind Configuration
# ============================================================
# 인프라 설정만 포함 (앱 시작 전 결정 필요, 런타임 변경 불가)
# 그 외 모든 설정은 Settings UI에서 런타임으로 관리됩니다.
# ============================================================

# --- 데이터베이스 연결 ---
database:
  host: ${DB_HOST:-localhost}
  port: ${DB_PORT:-5432}
  name: ${DB_NAME:-breadmind}
  user: ${DB_USER:-breadmind}
  password: ${DB_PASSWORD}

# --- 웹서버 바인드 ---
web:
  host: "127.0.0.1"
  port: 8080

# --- 보안 인프라 ---
security:
  auth_enabled: false
  password_hash: ""
  session_timeout: 7200
  cors_origins:
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
  require_https: false

# --- 분산 네트워크 모드 ---
network:
  mode: standalone  # standalone | commander | worker

# ============================================================
# 아래 설정들은 Settings UI / Setup Wizard에서 관리됩니다.
# DB에 저장되며 재부팅 시 자동 복원됩니다.
# ============================================================
#
# LLM 프로바이더 (Setup Wizard → DB)
#   llm: default_provider, default_model, tool_call_max_turns, tool_call_timeout_seconds
#   providers: claude, ollama, gemini, grok 등 API 키/URL
#
# MCP 서버 (Settings UI → DB)
#   mcp: auto_discover, max_restart_attempts, servers
#
# 메신저 인증 (Settings UI → DB)
#   messenger_config: 플랫폼별 allowed_users
#   messenger_token:*: 암호화된 토큰
#
# 운영 파라미터 (Settings UI → DB)
#   system_timeouts, retry_config, limits_config, polling_config, memory_gc_config
#
# 안전/페르소나/모니터링 (Settings UI → DB)
#   safety_blacklist, safety_approval, safety_permissions
#   persona, behavior_prompt, custom_prompts
#   monitoring_config, tool_security, agent_timeouts, logging_config
