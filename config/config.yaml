# ============================================================
# BreadMind Configuration
# ============================================================
# 인프라 설정 (런타임 변경 불가 - config.yaml에서만 관리)
# ============================================================

database:
  host: ${DB_HOST:-localhost}
  port: ${DB_PORT:-5432}
  name: ${DB_NAME:-breadmind}
  user: ${DB_USER:-breadmind}
  password: ${DB_PASSWORD:-breadmind_dev}

web:
  host: "127.0.0.1"
  port: 8080

security:
  auth_enabled: false
  password_hash: ""
  session_timeout: 86400
  cors_origins:
    - "http://localhost:8080"
    - "http://127.0.0.1:8080"
  require_https: false

llm:
  default_provider: claude
  default_model: claude-sonnet-4-6
  fallback_chain: [claude, ollama]
  tool_call_max_turns: 10
  tool_call_timeout_seconds: 30

providers:
  claude:
    type: api
    api_key: ${ANTHROPIC_API_KEY}
  ollama:
    type: ollama
    base_url: http://localhost:11434

mcp:
  auto_discover: true
  max_restart_attempts: 3
  servers: {}

network:
  mode: standalone

auth:
  messenger:
    slack:
      allowed_users: []
    discord:
      allowed_users: []
    telegram:
      allowed_users: []

# ============================================================
# 아래 설정들은 Settings UI에서 런타임으로 변경 가능합니다.
# 초기 기본값으로만 사용되며, UI에서 변경하면 DB에 저장됩니다.
# DB에 저장된 값이 있으면 이 파일의 값보다 우선합니다.
